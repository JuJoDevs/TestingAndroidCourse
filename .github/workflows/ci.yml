name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: write

jobs:
  static-analysis:
    name: 🔍 Static analysis (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

  assemble-debug:
    name: 🏗️ AssembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug assembleDebugUnitTest assembleDebugAndroidTest

      - name: Pack temporary build cache
        run: |
          mkdir -p /tmp/assemble-build-cache

          tar \
            --exclude='.git' \
            --exclude='.idea' \
            --exclude='.gradle/configuration-cache' \
            --exclude='.gradle/vcs-*' \
            -czf /tmp/assemble-build-cache/workspace.tgz .

          shopt -s nullglob
          gradle_home_paths=(.gradle/wrapper)
          for path in "$HOME"/.gradle/caches/{modules-2,jars-*,transforms-*,[0-9]*,build-cache-*}; do
            if [ -e "$path" ]; then
              gradle_home_paths+=("${path#$HOME/}")
            fi
          done

          tar -czf /tmp/assemble-build-cache/gradle-home.tgz -C "$HOME" "${gradle_home_paths[@]}"
          du -sh /tmp/assemble-build-cache/*

      - name: Save temporary build cache
        uses: actions/upload-artifact@v4
        with:
          name: assemble-build-cache
          path: /tmp/assemble-build-cache
          retention-days: 1

  unit-tests:
    name: 🧪 Unit Tests + coverage
    runs-on: ubuntu-latest
    needs: assemble-debug

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Restore temporary build cache
        uses: actions/download-artifact@v4
        with:
          name: assemble-build-cache
          path: /tmp/assemble-build-cache

      - name: Unpack temporary build cache
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/assemble-build-cache/workspace.tgz
          tar -xzf /tmp/assemble-build-cache/gradle-home.tgz -C "$HOME"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest koverXmlReportDebug koverHtmlReportDebug koverVerifyDebug

      - name: Cobertura -> resumen del run
        if: always()
        run: |
          XML=app/build/reports/kover/reportDebug.xml
          if [ -f "$XML" ]; then
            echo "## 🧪 Cobertura de líneas (unit)" >> "$GITHUB_STEP_SUMMARY"
            awk -F'"' '/type="LINE"/{m=$4;c=$6} END{t=m+c; if(t>0) printf "- **%d%%** (%d/%d líneas) — gate mínimo: 20%%\n", c*100/t, c, t}' "$XML" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Unit test results
          files: app/build/test-results/testDebugUnitTest/**/*.xml

  instrumented-tests:
    name: 📱 Instrumented (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: assemble-debug
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 30, 34]
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true
      - name: Restore temporary build cache
        uses: actions/download-artifact@v4
        with:
          name: assemble-build-cache
          path: /tmp/assemble-build-cache
      - name: Unpack temporary build cache
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/assemble-build-cache/workspace.tgz
          tar -xzf /tmp/assemble-build-cache/gradle-home.tgz -C "$HOME"
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest
      - name: Publish instrumented results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Instrumented results (API ${{ matrix.api-level }})
          files: app/build/outputs/androidTest-results/connected/**/*.xml
      - name: Upload instrumented report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/
          retention-days: 1


  cleanup-temporary-cache:
    name: 🧹 Cleanup temporary cache
    runs-on: ubuntu-latest
    needs: [unit-tests, instrumented-tests]
    if: always()
    outputs:
      cache_size_mb: ${{ steps.delete-cache.outputs.cache_size_mb }}
      cache_lifetime_minutes: ${{ steps.delete-cache.outputs.cache_lifetime_minutes }}
      cache_gb_hours: ${{ steps.delete-cache.outputs.cache_gb_hours }}
      cache_gb_months: ${{ steps.delete-cache.outputs.cache_gb_months }}
    steps:
      - name: Delete temporary build cache
        id: delete-cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact=$(
            gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
              --jq '.artifacts[] | select(.name == "assemble-build-cache") | [.id, .size_in_bytes, .created_at] | @tsv' \
            | head -n 1
          )

          if [ -z "$artifact" ]; then
            {
              echo "cache_size_mb=0"
              echo "cache_lifetime_minutes=0"
              echo "cache_gb_hours=0"
              echo "cache_gb_months=0"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          read -r artifact_id size_bytes created_at <<< "$artifact"
          now_epoch=$(date -u +%s)
          created_epoch=$(date -u -d "$created_at" +%s)
          lifetime_seconds=$((now_epoch - created_epoch))

          awk -v bytes="$size_bytes" -v seconds="$lifetime_seconds" 'BEGIN {
            size_mb = bytes / 1024 / 1024
            minutes = seconds / 60
            gb_hours = (bytes / 1024 / 1024 / 1024) * (seconds / 3600)
            gb_months = gb_hours / 720
            printf "cache_size_mb=%.2f\n", size_mb
            printf "cache_lifetime_minutes=%.2f\n", minutes
            printf "cache_gb_hours=%.6f\n", gb_hours
            printf "cache_gb_months=%.9f\n", gb_months
          }' >> "$GITHUB_OUTPUT"

          gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/"$artifact_id"

  summary:
    name: 🧾 CI summary
    runs-on: ubuntu-latest
    needs: [static-analysis, cleanup-temporary-cache]
    if: always()
    steps:
      - name: Tabla resumen del pipeline
        run: |
          {
            echo "## 🧾 Resumen del pipeline"
            echo ""
            echo "| Etapa | Resultado |"
            echo "|---|---|"
            echo "| 🔍 Static analysis (ktlint) | ${{ needs.static-analysis.result == 'success' && '✅ pass' || format('❌ {0}', needs.static-analysis.result) }} |"
            echo "| 🏗️ Assemble debug | ${{ needs.assemble-debug.result == 'success' && '✅ pass' || format('❌ {0}', needs.assemble-debug.result) }} |"
            echo "| 🧪 Unit tests + coverage gate | ${{ needs.unit-tests.result == 'success' && '✅ pass' || format('❌ {0}', needs.unit-tests.result) }} |"
            echo "| 📱 Instrumented (API 26/30/34) | ${{ needs.instrumented-tests.result == 'success' && '✅ pass' || format('❌ {0}', needs.instrumented-tests.result) }} |"
            echo ""
            echo "## 🧹 Cache temporal de build"
            echo ""
            echo "- **Tamaño**: ${{ needs.cleanup-temporary-cache.outputs.cache_size_mb }} MB"
            echo "- **Tiempo vivo**: ${{ needs.cleanup-temporary-cache.outputs.cache_lifetime_minutes }} minutos"
            echo "- **Uso estimado**: ${{ needs.cleanup-temporary-cache.outputs.cache_gb_hours }} GB-hours (${{ needs.cleanup-temporary-cache.outputs.cache_gb_months }} GB-months)"
            echo ""
            echo "> Estimación calculada antes de borrar el artifact temporal \`assemble-build-cache\`."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Marcar rojo si algo falló
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Algún job del pipeline falló — revisa la tabla del Summary." >&2
          exit 1
